# HTTP 重定向到 HTTPS
server {
    listen       80;
    server_name  luminablog.cn www.luminablog.cn;

    # 将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 主配置
server {
    listen       443 ssl http2;
    server_name  luminablog.cn www.luminablog.cn;

    # SSL 证书配置
    ssl_certificate      /etc/nginx/ssl/luminablog.cn.pem;
    ssl_certificate_key  /etc/nginx/ssl/luminablog.cn.key;

    # SSL 安全配置（推荐）
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:50m;
    ssl_session_tickets  off;

    # 现代加密算法配置
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers  off;

    # HSTS (可选，强制使用 HTTPS)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 前端静态资源
    location / {
        root   /data/blogs_workspace/frontend/dist;
        index  index.html;
        try_files $uri $uri/ /index.html; # 支持 Vue Router 的 History 模式
    }

    # 后端 API 反向代理
    location /api {
        client_max_body_size 50M;
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 静态文件上传目录 (如果有本地上传需求)
    location /uploads/ {
        alias /data/uploads/blog/;
    }
}
